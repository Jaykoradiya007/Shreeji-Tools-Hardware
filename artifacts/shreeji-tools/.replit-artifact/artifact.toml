kind = "web"
previewPath = "/"
title = "Shreeji Tools & Hardware"
version = "1.0.0"
id = "artifacts/shreeji-tools"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20929
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/shreeji-tools run dev"

[services.env]
PORT = "20929"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/shreeji-tools", "run", "build"]
publicDir = "artifacts/shreeji-tools/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
